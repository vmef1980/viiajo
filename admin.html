<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="admin-title">Panel de Control</title>
    
    <link rel="icon" type="image/x-icon" id="js-favicon" href="">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { 
            --primary: #F47C20; 
            --dark: #1C3F60; 
            --danger: #dc3545; 
            --info: #0074B7; 
            --success: #28a745; 
            --bg: #f8fafc;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); padding: 20px; color: var(--dark); margin: 0; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .brand-header { 
            display: flex; align-items: center; justify-content: space-between; 
            margin-bottom: 30px; background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(10px); padding: 20px 30px; border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.3);
        }
        .brand-logo { height: 60px; }

        .card { 
            background: white; padding: 30px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-bottom: 25px; 
            border: 1px solid #f1f5f9; transition: all 0.4s; 
        }
        
        h2 { 
            color: var(--dark); margin-top: 0; border-bottom: 2px solid #f1f5f9; 
            padding-bottom: 15px; display: flex; align-items: center; gap: 12px; 
            font-size: 1.4rem; font-weight: 800;
        }
        h2 i { color: var(--primary); }
        
        .modo-edicion { border: 2px solid var(--info); background: #f8fbff; transform: translateY(-5px); }

        .search-container { margin-bottom: 25px; position: relative; display: flex; gap: 10px; flex-wrap: wrap; }
        .search-wrapper { position: relative; flex: 1; min-width: 250px; }
        .search-input { 
            width: 100%; padding: 16px 55px; border-radius: 16px; 
            border: 2px solid #e2e8f0; box-sizing: border-box; font-size: 1rem; 
            outline: none; transition: 0.3s; background: white;
        }
        .search-icon { position: absolute; left: 20px; top: 18px; color: var(--primary); font-size: 1.3rem; }
        
        .btn-toggle-id, .btn-sort { background: white; border: 2px solid #e2e8f0; border-radius: 16px; padding: 0 20px; cursor: pointer; color: #64748b; font-weight: 700; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-toggle-id.active, .btn-sort.active { border-color: var(--primary); color: var(--primary); background: #fff7ed; }

        .advanced-filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 16px; }
        .filter-field { display: flex; flex-direction: column; gap: 5px; }
        .filter-field label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-left: 5px; }
        .filter-select { padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 0.85rem; font-weight: 600; color: var(--dark); cursor: pointer; }

        .export-bar { display: flex; gap: 10px; margin-bottom: 15px; justify-content: flex-end; align-items: center; flex-wrap: wrap; }
        .btn-export { padding: 8px 15px; border-radius: 10px; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; font-weight: 700; color: white; cursor: pointer; border: none; transition: 0.3s; }
        .btn-excel { background: #1D6F42; }
        .btn-pdf { background: #E03131; }
        .btn-img { background: #6366f1; }
        .select-grid { padding: 8px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 0.75rem; font-weight: 700; color: var(--dark); }

        #search-results-tag { display: inline-block; margin-top: 10px; font-size: 0.85rem; font-weight: 600; color: var(--info); padding: 4px 12px; background: #e0f2fe; border-radius: 8px; }

        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field.hidden { display: none; }
        label { font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: #64748b; }
        input, textarea, select { padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem; font-family: inherit; }
        
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        button { border: none; padding: 16px; border-radius: 14px; cursor: pointer; font-weight: 800; transition: 0.3s; text-transform: uppercase; font-size: 0.85rem; }
        #btnGuardar { background: linear-gradient(135deg, var(--primary), #e06b10); color: white; flex: 2; }
        #btnCancelar { background: #f1f5f9; color: #64748b; flex: 1; display: none; }

        .table-wrapper { overflow-x: auto; border-radius: 20px; border: 1px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 1000px; }
        th { background: #f8fafc; color: #64748b; padding: 18px; text-align: left; border-bottom: 2px solid #f1f5f9; }
        td { padding: 16px; border-bottom: 1px solid #f8fafc; vertical-align: middle; }
        
        .id-text { display: block; font-size: 0.75rem; color: #94a3b8; }
        .id-text.hidden { display: none; }

        .img-preview { width: 55px; height: 55px; object-fit: cover; border-radius: 14px; }
        .btn-accion { width: 38px; height: 38px; border-radius: 10px; cursor: pointer; border: none; display: inline-flex; align-items: center; justify-content: center; }
        .btn-edit { background: #eff6ff; color: var(--info); }
        .badge { padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; }
        .disponible { background: #dcfce7; color: #166534; }
        .agotado { background: #fee2e2; color: #991b1b; }

        /* Contenedor Oculto de Renderizado */
        #render-container { 
            position: fixed; top: -10000px; left: -10000px; 
            background: white; padding: 60px; width: 1300px; 
        }
        .catalog-page-container { position: relative; background: white; padding: 20px; }
        .watermark-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            width: 600px; opacity: 0.05; z-index: 0; pointer-events: none;
        }
        .catalog-content { position: relative; z-index: 1; }
        .catalog-grid { display: grid; gap: 20px; margin-bottom: 20px; }
        .catalog-item { border: 1px solid #eee; border-radius: 15px; padding: 15px; text-align: center; background: rgba(255,255,255,0.9); }
        .catalog-item img { width: 100%; height: 200px; object-fit: contain; border-radius: 10px; margin-bottom: 10px; }
        .catalog-item h3 { font-size: 1.1rem; margin: 10px 0; color: var(--dark); line-height: 1.2; font-weight: 700; word-wrap: break-word; }
        .catalog-item p { font-weight: 800; color: var(--primary); font-size: 1.3rem; margin: 5px 0; }
        .catalog-item .status-tag { font-size: 0.7rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="render-container"></div>

<div class="container">
    <div class="brand-header">
        <img src="img/GuateCocina.png" id="js-brand-logo" alt="Logo" class="brand-logo">
        <div style="text-align: right">
            <h1 id="js-brand-name" style="margin:0; font-size: 1.6rem; color: var(--dark);">GuateCocina</h1>
            <small id="js-brand-tagline" style="font-weight: 700; text-transform: uppercase; font-size: 0.7rem;">GESTIÓN DE INVENTARIOS V1.0</small>
        </div>
    </div>

    <div class="card" id="contenedorForm">
        <h2 id="tituloForm"><i class="bi bi-magic"></i> Gestionar Producto</h2>
        <form id="formAdmin">
            <div class="grid-form">
                <div class="field" id="field-id"><label>ID Único</label><input type="text" id="id" required></div>
                <div class="field"><label>Nombre del Producto</label><input type="text" id="titulo" required></div>
                <div class="field"><label>Imagen Principal (URL)</label><input type="url" id="imagen" required></div>
                <div class="field"><label>Galería (Separar con |)</label><input type="text" id="imagenes"></div>
                <div class="field"><label>ID Categoría</label><input type="text" id="categoria_id" required></div>
                <div class="field"><label>Nombre Categoría</label><input type="text" id="categoria_nombre" required></div>
                <div class="field"><label>ID Subcategoría</label><input type="text" id="subcategoria_id"></div>
                <div class="field"><label>Nombre Subcategoría</label><input type="text" id="subcategoria_nombre"></div>
                <div class="field"><label>Precio (Q)</label><input type="number" id="precio" step="0.01" required></div>
                <div class="field">
                    <label>Estado de Inventario</label>
                    <select id="estado">
                        <option value="DISPONIBLE">🟢 DISPONIBLE</option>
                        <option value="AGOTADO">🔴 AGOTADO</option>
                    </select>
                </div>
                <div class="field full-width">
                    <label>Descripción detallada y Medidas</label>
                    <textarea id="producto_descripcion" rows="3"></textarea>
                </div>
            </div>
            <div class="btn-group">
                <button type="submit" id="btnGuardar">Sincronizar Datos</button>
                <button type="button" id="btnCancelar" onclick="cancelarEdicion()">Descartar Cambios</button>
            </div>
        </form>
    </div>

    <div class="card" id="seccion-tabla">
        <h2><i class="bi bi-layers-half"></i> Inventario de Productos</h2>
        <div class="export-bar">
            <select id="gridSelect" class="select-grid">
                <option value="4x3">Cuadrícula 4x3 (12)</option>
                <option value="3x3">Cuadrícula 3x3 (9)</option>
                <option value="2x2">Cuadrícula 2x2 (4)</option>
            </select>
            <button class="btn-export btn-img" onclick="exportarImagen()"><i class="bi bi-image"></i> Exportar Imágenes</button>
            <button class="btn-export btn-excel" onclick="exportarExcel()"><i class="bi bi-file-earmark-excel"></i> Excel</button>
            <button class="btn-export btn-pdf" onclick="exportarPDF()"><i class="bi bi-file-earmark-pdf"></i> PDF</button>
        </div>

        <div class="advanced-filters">
            <div class="filter-field">
                <label>Producto</label>
                <select id="filter-producto" class="filter-select" onchange="filtrarProductos()">
                    <option value="">Todos los Productos</option>
                </select>
            </div>
            <div class="filter-field">
                <label>Categoría</label>
                <select id="filter-categoria" class="filter-select" onchange="filtrarProductos()">
                    <option value="">Todas las Categorías</option>
                </select>
            </div>
            <div class="filter-field">
                <label>Subcategoría</label>
                <select id="filter-subcategoria" class="filter-select" onchange="filtrarProductos()">
                    <option value="">Todas las Subcategorías</option>
                </select>
            </div>
        </div>

        <div class="search-container">
            <div class="search-wrapper">
                <i class="bi bi-search search-icon"></i>
                <input type="text" id="txtSearch" class="search-input" placeholder="Buscar por palabra clave...">
            </div>
            <button id="btnSort" class="btn-sort" onclick="toggleSort()">
                <i class="bi bi-sort-alpha-down"></i> <span>A-Z</span>
            </button>
            <button id="btnToggleID" class="btn-toggle-id active" onclick="toggleIDVisibility()">
                <i class="bi bi-eye"></i> <span>ID</span>
            </button>
        </div>
        <span id="search-results-tag">Esperando búsqueda...</span>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Acciones</th>
                        <th>Vista</th>
                        <th>Producto</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>Precio</th>
                    </tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        brandName: "Viiajo",
        tagline: "GESTIÓN DE INVENTARIOS V1.0",
        logoUrl: "img/Viiajo.png",
        favicon: "img/Viiajo.ico", 
        color_primary: "#F47C20", 
        color_dark: "#1C3F60",    
        color_info: "#0074B7",    
        SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyrLXdQL0dyQXShneMcJtsPCfbd2k9SliFMODER90Ia2qAqUcvhPRQVKYTFx4csn_jqAA/exec",
        CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSHAY87rIFAPkwYS9bJvT80ydkUuxn1kTd6aS-Y7mM-1zoHNCqGewaL-NiYtyyFxjFLM4p5iSTA_bs4/pub?output=csv"
    };

    let productosGlobal = [];
    let productosFiltrados = [];
    let showID = true;
    let ascendingOrder = true;

    // CARGA DE IMÁGENES CON TRIPLE REDUNDANCIA
    const getBase64 = async (url) => {
        if (!url) return "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";
        
        const proxies = [
            (u) => `https://images.weserv.nl/?url=${encodeURIComponent(u.replace('https://', '').replace('http://', ''))}&w=400&output=jpg`,
            (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
            (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`
        ];

        for (const getProxyUrl of proxies) {
            try {
                const target = getProxyUrl(url);
                const response = await fetch(target);
                if (response.ok) {
                    const blob = await response.blob();
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    });
                }
            } catch (e) { continue; }
        }
        return "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mN8Ww8AAnEBX609m98AAAAASUVORK5CYII=";
    };

    function aplicarConfiguracion() {
        document.getElementById('js-brand-name').innerText = CONFIG.brandName;
        document.getElementById('js-brand-tagline').innerText = CONFIG.tagline;
        document.getElementById('js-brand-logo').src = CONFIG.logoUrl;
        document.getElementById('admin-title').innerText = "Admin | " + CONFIG.brandName;
        document.getElementById('js-favicon').href = CONFIG.favicon;
        cargarDatos();
    }

    async function cargarDatos() {
        try {
            const response = await fetch(`${CONFIG.CSV_URL}&t=${Date.now()}`);
            const data = await response.text();
            const rows = parseCSV(data);
            productosGlobal = [];
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r[0]) continue;
                productosGlobal.push({
                    id: r[0], titulo: r[1], imagen: r[2], imagenes: r[3],
                    cat_id: r[4], cat_nom: r[5], sub_id: r[6], sub_nom: r[7],
                    desc: r[8], precio: r[9], estado: (r[10] || "DISPONIBLE").trim().toUpperCase()
                });
            }
            poblarFiltros();
            productosFiltrados = [...productosGlobal];
            renderTabla(productosFiltrados);
        } catch (e) { console.error(e); }
    }

    function poblarFiltros() {
        const selProd = document.getElementById('filter-producto');
        const selCat = document.getElementById('filter-categoria');
        const selSub = document.getElementById('filter-subcategoria');

        const productosUnicos = [...new Set(productosGlobal.map(p => p.titulo))].sort();
        const categoriasUnicas = [...new Set(productosGlobal.map(p => p.cat_nom))].sort();
        const subcategoriasUnicas = [...new Set(productosGlobal.map(p => p.sub_nom).filter(s => s))].sort();

        selProd.innerHTML = '<option value="">Todos los Productos</option>' + productosUnicos.map(p => `<option value="${p}">${p}</option>`).join('');
        selCat.innerHTML = '<option value="">Todas las Categorías</option>' + categoriasUnicas.map(c => `<option value="${c}">${c}</option>`).join('');
        selSub.innerHTML = '<option value="">Todas las Subcategorías</option>' + subcategoriasUnicas.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function renderTabla(lista) {
        const body = document.getElementById('tablaBody');
        body.innerHTML = lista.map(p => `
            <tr>
                <td><button class="btn-accion btn-edit" onclick="prepararEdicion('${p.id}')"><i class="bi bi-pencil-square"></i></button></td>
                <td><img src="${p.imagen}" class="img-preview" onerror="this.src='https://via.placeholder.com/50'"></td>
                <td><strong>${p.titulo}</strong><br><small class="id-text ${showID ? '' : 'hidden'}">${p.id}</small></td>
                <td>${p.cat_nom}</td>
                <td><span class="badge ${p.estado === 'AGOTADO' ? 'agotado' : 'disponible'}">${p.estado}</span></td>
                <td>Q${parseFloat(p.precio || 0).toFixed(2)}</td>
            </tr>
        `).join('');
        document.getElementById('search-results-tag').innerText = `${lista.length} encontrados`;
    }

    function filtrarProductos() {
        const txt = document.getElementById('txtSearch').value.toLowerCase();
        const fProd = document.getElementById('filter-producto').value;
        const fCat = document.getElementById('filter-categoria').value;
        const fSub = document.getElementById('filter-subcategoria').value;

        productosFiltrados = productosGlobal.filter(p => {
            const matchTxt = p.titulo.toLowerCase().includes(txt) || p.id.toLowerCase().includes(txt) || p.cat_nom.toLowerCase().includes(txt);
            const matchProd = fProd === "" || p.titulo === fProd;
            const matchCat = fCat === "" || p.cat_nom === fCat;
            const matchSub = fSub === "" || p.sub_nom === fSub;
            return matchTxt && matchProd && matchCat && matchSub;
        });

        renderTabla(productosFiltrados);
    }

    function toggleIDVisibility() {
        showID = !showID;
        const btn = document.getElementById('btnToggleID');
        const fieldID = document.getElementById('field-id');
        if (showID) {
            btn.classList.add('active');
            btn.querySelector('i').className = 'bi bi-eye';
            fieldID.classList.remove('hidden');
        } else {
            btn.classList.remove('active');
            btn.querySelector('i').className = 'bi bi-eye-slash';
            fieldID.classList.add('hidden');
        }
        renderTabla(productosFiltrados);
    }

    function toggleSort() {
        ascendingOrder = !ascendingOrder;
        const btn = document.getElementById('btnSort');
        btn.classList.toggle('active');
        productosFiltrados.sort((a, b) => {
            const titleA = a.titulo.toLowerCase();
            const titleB = b.titulo.toLowerCase();
            return ascendingOrder ? titleA.localeCompare(titleB) : titleB.localeCompare(titleA);
        });
        btn.querySelector('i').className = ascendingOrder ? 'bi bi-sort-alpha-down' : 'bi bi-sort-alpha-up';
        renderTabla(productosFiltrados);
    }

    async function exportarImagen() {
        const gridType = document.getElementById('gridSelect').value;
        const [cols, rows] = gridType.split('x').map(Number);
        const limitPerPage = cols * rows;
        const container = document.getElementById('render-container');
        const btn = document.querySelector('.btn-img');
        const originalText = btn.innerHTML;
        
        btn.disabled = true; 
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Preparando...';

        try {
            const logoBase64 = await getBase64(CONFIG.logoUrl);
            const totalPaginas = Math.ceil(productosFiltrados.length / limitPerPage);

            for (let pageIndex = 0; pageIndex < totalPaginas; pageIndex++) {
                container.innerHTML = ""; 
                const start = pageIndex * limitPerPage;
                const chunk = productosFiltrados.slice(start, start + limitPerPage);
                btn.innerHTML = `<i class="bi bi-hourglass-split"></i> Pág ${pageIndex+1}/${totalPaginas}...`;

                const pImagesBase64 = await Promise.all(chunk.map(p => getBase64(p.imagen)));

                const pageDiv = document.createElement('div');
                pageDiv.className = "catalog-page-container";
                
                let html = `
                    <img src="${logoBase64}" class="watermark-center">
                    <div class="catalog-content">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom:4px solid ${CONFIG.color_primary}; padding-bottom:15px; background:white;">
                            <div style="display:flex; align-items:center; gap:20px;">
                                <img src="${logoBase64}" style="height:80px;">
                                <h1 style="margin:0; font-size:2.5rem; color:${CONFIG.color_dark};">${CONFIG.brandName}</h1>
                            </div>
                            <h2 style="margin:0; color:#666;">Página ${pageIndex + 1} / ${totalPaginas}</h2>
                        </div>
                        <div class="catalog-grid" style="grid-template-columns: repeat(${cols}, 1fr);">`;

                chunk.forEach((p, index) => {
                    const pImg = pImagesBase64[index];
                    const statusColor = p.estado === 'AGOTADO' ? '#991b1b' : '#166534';
                    const statusBg = p.estado === 'AGOTADO' ? '#fee2e2' : '#dcfce7';
                    html += `
                        <div class="catalog-item">
                            <img src="${pImg}">
                            <div style="min-height: 80px; display: flex; flex-direction: column; justify-content: center;">
                                <h3>${p.titulo}</h3>
                                ${showID ? `<span style="font-size:0.7rem; color:#999; display:block;">ID: ${p.id}</span>` : ''}
                            </div>
                            <p>Q${parseFloat(p.precio).toFixed(2)}</p>
                            <span class="status-tag" style="background:${statusBg}; color:${statusColor}">${p.estado}</span>
                        </div>`;
                });

                html += `</div><div style="text-align:right; font-size:0.9rem; color:#888;">${CONFIG.tagline}</div></div>`;
                pageDiv.innerHTML = html;
                container.appendChild(pageDiv);

                await new Promise(r => setTimeout(r, 600));
                const canvas = await html2canvas(pageDiv, { useCORS: true, scale: 2, backgroundColor: "#ffffff" });
                const link = document.createElement('a');
                link.download = `Catalogo_${CONFIG.brandName}_Pag_${pageIndex + 1}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            }
        } catch (e) { alert("Error al exportar"); }
        finally { btn.disabled = false; btn.innerHTML = originalText; container.innerHTML = ""; }
    }

    window.prepararEdicion = (id) => {
        const p = productosGlobal.find(x => x.id === id);
        if (!p) return;
        document.getElementById('id').value = p.id;
        document.getElementById('id').readOnly = true;
        document.getElementById('titulo').value = p.titulo;
        document.getElementById('imagen').value = p.imagen;
        document.getElementById('imagenes').value = p.imagenes || "";
        document.getElementById('categoria_id').value = p.cat_id;
        document.getElementById('categoria_nombre').value = p.cat_nom;
        document.getElementById('subcategoria_id').value = p.sub_id;
        document.getElementById('subcategoria_nombre').value = p.sub_nom;
        document.getElementById('precio').value = p.precio;
        document.getElementById('estado').value = p.estado;
        document.getElementById('producto_descripcion').value = p.desc || ""; 

        document.getElementById('contenedorForm').classList.add('modo-edicion');
        document.getElementById('btnGuardar').innerText = "Guardar Cambios";
        document.getElementById('btnCancelar').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    function cancelarEdicion() {
        document.getElementById('formAdmin').reset();
        document.getElementById('id').readOnly = false;
        document.getElementById('contenedorForm').classList.remove('modo-edicion');
        document.getElementById('btnGuardar').innerText = "Sincronizar Datos";
        document.getElementById('btnCancelar').style.display = "none";
    }

    async function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const btn = document.querySelector('.btn-pdf');
        const originalText = btn.innerHTML;
        btn.disabled = true; btn.innerHTML = 'Procesando...';

        const tableBody = [];
        for (let p of productosFiltrados) {
            const imgData = await getBase64(p.imagen);
            const row = ["", p.titulo, p.cat_nom, p.estado, `Q${p.precio}`];
            if(showID) row.splice(1, 0, p.id);
            tableBody.push({ img: imgData, data: row });
        }

        const headers = ['Vista', 'Producto', 'Categoría', 'Estado', 'Precio'];
        if(showID) headers.splice(1, 0, 'ID');

        doc.autoTable({
            head: [headers],
            body: tableBody.map(r => r.data),
            didDrawCell: (data) => {
                if (data.section === 'body' && data.column.index === 0) {
                    const rowIdx = data.row.index;
                    if(tableBody[rowIdx].img) doc.addImage(tableBody[rowIdx].img, 'JPEG', data.cell.x + 2, data.cell.y + 2, 10, 10);
                }
            },
            styles: { minCellHeight: 15, verticalAlign: 'middle' }
        });

        doc.save(`Inventario_${CONFIG.brandName}.pdf`);
        btn.disabled = false; btn.innerHTML = originalText;
    }

    function exportarExcel() {
        const datosExcel = productosFiltrados.map(p => {
            const base = { "Producto": p.titulo, "Categoría": p.cat_nom, "Estado": p.estado, "Precio": p.precio };
            return showID ? { "ID": p.id, ...base } : base;
        });
        const ws = XLSX.utils.json_to_sheet(datosExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Productos");
        XLSX.writeFile(wb, `Inventario_${CONFIG.brandName}.xlsx`);
    }

    function parseCSV(text) {
        const lines = []; let curLine = []; let curCell = ""; let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"') inQuotes = !inQuotes;
            else if (c === ',' && !inQuotes) { curLine.push(curCell); curCell = ""; }
            else if (c === '\n' && !inQuotes) { curLine.push(curCell); lines.push(curLine); curLine = []; curCell = ""; }
            else curCell += c;
        }
        curLine.push(curCell); lines.push(curLine); return lines;
    }

    document.getElementById('formAdmin').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnGuardar');
        btn.disabled = true; btn.innerText = "Sincronizando...";
        const payload = {
            action: "upsert",
            id: document.getElementById('id').value.trim(),
            titulo: document.getElementById('titulo').value.trim(),
            imagen: document.getElementById('imagen').value.trim(),
            imagenes: document.getElementById('imagenes').value.trim() || document.getElementById('imagen').value.trim(),
            categoria_id: document.getElementById('categoria_id').value,
            categoria_nombre: document.getElementById('categoria_nombre').value,
            subcategoria_id: document.getElementById('subcategoria_id').value,
            subcategoria_nombre: document.getElementById('subcategoria_nombre').value,
            producto_descripcion: document.getElementById('producto_descripcion').value,
            precio: document.getElementById('precio').value,
            estado: document.getElementById('estado').value
        };
        try {
            await fetch(CONFIG.SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("✅ Sincronizado");
            cancelarEdicion();
            setTimeout(cargarDatos, 1500);
        } catch (e) { alert("Error"); }
        finally { btn.disabled = false; btn.innerText = "Sincronizar Datos"; }
    };

    window.onload = aplicarConfiguracion;
    document.getElementById('txtSearch').addEventListener('input', filtrarProductos);
</script>
