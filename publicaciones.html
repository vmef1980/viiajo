<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Ads HD Pro | OrganizaGT</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3061/3061341.png">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        :root { --primary: #F47C20; --dark: #1C3F60; --bg: #f4f7f6; }
        
        /* Layout Base */
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; flex-direction: row; }
        
        /* Estilo Responsive del Sidebar */
        .sidebar { width: 400px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 10; }
        .sidebar-header { padding: 25px 20px; background: var(--dark); color: white; text-align: center; }
        .sidebar-content { padding: 20px; overflow-y: auto; flex-grow: 1; }

        /* Espaciado de controles */
        .form-group { margin-bottom: 15px; }
        .checkbox-group { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .checkbox-group label { margin-bottom: 0; cursor: pointer; display: flex; align-items: center; gap: 5px; text-transform: none; font-size: 0.8rem; }
        .checkbox-group input { width: auto; cursor: pointer; }

        label { display: block; font-weight: 800; font-size: 0.7rem; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 0.9rem; box-sizing: border-box; }
        
        /* Botones */
        .btn { border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 8px; display: block; text-align: center; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: var(--dark); color: white; font-size: 0.75rem; }

        /* Área de Diseño */
        .workspace { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 40px; background: #cbd5e0; position: relative; }
        .canvas-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 95%; }
        canvas { max-width: 100%; height: auto; border-radius: 8px; display: block; background: #fff; }

        .copy-section { background: #fdfaf0; padding: 12px; border-radius: 10px; border: 1px solid #faead1; margin-top: 10px; }
        #copyTextArea { height: 120px; font-size: 0.8rem; border: 1px solid #ddd; background: white; resize: none; margin-bottom: 8px; }

        /* --- MEDIA QUERIES PARA CELULAR --- */
        @media (max-width: 850px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #ddd; height: auto; }
            .workspace { width: 100%; height: auto; padding: 20px 0; }
            .sidebar-content { overflow-y: visible; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 id="js-brand-name" style="margin:0; font-size: 1.2rem;">MARKETING TOOL HD</h2>
        <p id="js-brand-tagline" style="margin:5px 0 0; opacity: 0.7; font-size: 0.7rem;">OrganizaGT Business</p>
    </div>
    
    <div class="sidebar-content">
        <div class="form-group">
            <label>1. Catálogo (CSV)</label>
            <input type="text" id="csvUrl" value="https://docs.google.com/spreadsheets/d/e/2PACX-1vR7Zyc9Avk6GHrzXR5lDrs9mvfQMptixZpH9RoZ5I7AqlVGYEWtUqWiLw_ucBxY1rHKBOPHyo9Biftj/pub?output=csv">
            <button class="btn btn-primary" onclick="cargarCatalogo()" style="margin-top:8px;">Sincronizar</button>
        </div>

        <div class="form-group">
            <label>Link Web / Catálogo</label>
            <input type="text" id="userWeb" placeholder="www.tuweb.com" oninput="actualizarInterfaz()">
        </div>
        <div class="form-group">
            <label>WhatsApp</label>
            <input type="text" id="userWA" placeholder="502XXXXXXXX" oninput="actualizarInterfaz()">
        </div>

        <label>Mostrar en la imagen:</label>
        <div class="checkbox-group">
            <label><input type="checkbox" id="showWeb" onchange="actualizarInterfaz()"> Link Web</label>
            <label><input type="checkbox" id="showWA" onchange="actualizarInterfaz()"> WhatsApp</label>
        </div>

        <div class="form-group">
            <label>Producto</label>
            <select id="productSelect" onchange="actualizarInterfaz()">
                <option value="">-- Selecciona --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Plataforma y Formato</label>
            <select id="platformSelect" onchange="actualizarInterfaz()">
                <option value="ig_post">Instagram / Facebook (1:1)</option>
                <option value="tiktok">TikTok / Reels / Stories (9:16)</option>
                <option value="fb_ads">Facebook Ads (16:9)</option>
                <option value="ig_portrait">Instagram Portrait (4:5)</option>
            </select>
        </div>

        <div class="copy-section">
            <label>Copy y Hashtags</label>
            <textarea id="copyTextArea" readonly></textarea>
            <button class="btn btn-info" onclick="copiarAlPortapapeles()">Copiar Texto</button>
        </div>

        <div class="form-group" style="margin-top:15px;">
            <label>Color de Marca</label>
            <input type="color" id="accentColor" value="#F47C20" onchange="actualizarInterfaz()">
        </div>

        <button class="btn btn-success" id="btnDescargar" onclick="descargarTodo()">
            <i class="bi bi-download"></i> Descargar Imágenes
        </button>
    </div>
</div>

<div class="workspace" id="previewArea">
</div>

<script>
    /***********************************************************
     * CENTRALIZACIÓN DE INFORMACIÓN COMERCIAL
     ***********************************************************/
    const COMERCIAL_CONFIG = {
        tituloPagina: "Social Ads HD Pro | Viiajo",
        favicon: "img/Viiajo.ico",
        nombreHeader: "MARKETING TOOL HD",
        tagline: "Viiajo Business",
        logoParaImagen: "img/Viiajo_Nombre.png",
        csvDefault: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSHAY87rIFAPkwYS9bJvT80ydkUuxn1kTd6aS-Y7mM-1zoHNCqGewaL-NiYtyyFxjFLM4p5iSTA_bs4/pub?output=csv",
        colorDefault: "#007BC4",
        hashtagsBase: "#Guatemala #VentasGT #TiendaOnline #EnviosGuate #VisaGT #Efectivo #Ofertas #Viiajo"
    };

    // Proxy más estable para imágenes y manipulación de Canvas
    const PROXY = "https://images.weserv.nl/?url=";
    const LOGO_URL = COMERCIAL_CONFIG.logoParaImagen; 
    let productosGlobal = [];

    window.onload = () => {
        document.title = COMERCIAL_CONFIG.tituloPagina;
        const fav = document.querySelector("link[rel='icon']");
        if(fav) fav.href = COMERCIAL_CONFIG.favicon;
        document.getElementById('js-brand-name').innerText = COMERCIAL_CONFIG.nombreHeader;
        document.getElementById('js-brand-tagline').innerText = COMERCIAL_CONFIG.tagline;
        document.getElementById('csvUrl').value = COMERCIAL_CONFIG.csvDefault;
        document.getElementById('accentColor').value = COMERCIAL_CONFIG.colorDefault;
    };

    // ... (Funciones csvToArray y cargarCatalogo se mantienen igual) ...

    async function cargarCatalogo() {
        const url = document.getElementById('csvUrl').value;
        try {
            const res = await fetch(`${url}&t=${Date.now()}`);
            const text = await res.text();
            const rawRows = csvToArray(text);
            
            productosGlobal = rawRows.slice(1).filter(r => r.length > 1 && r[0] !== "").map(r => {
                const nombreCompleto = r[1] || "";
                const partes = nombreCompleto.split('|');
                return {
                    id: r[0], 
                    tituloDisplay: partes[0].trim(), 
                    tituloGancho: partes[1] ? partes[1].trim() : partes[0].trim(), 
                    imgP: r[2], 
                    imgG: r[3], 
                    cat: r[5], 
                    subCat: r[7], 
                    desc: r[8], 
                    precio: r[9]
                };
            });

            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="">-- Elige un producto --</option>';
            productosGlobal.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p.id; 
                opt.textContent = p.tituloDisplay; 
                select.appendChild(opt);
            });
            alert("✅ Catálogo sincronizado.");
        } catch (e) { alert("❌ Error de carga de CSV."); }
    }

    function actualizarInterfaz() {
        renderizarPublicidad();
        generarCopyCompleto();
    }

    async function renderizarPublicidad() {
        const id = document.getElementById('productSelect').value;
        const platform = document.getElementById('platformSelect').value;
        const color = document.getElementById('accentColor').value;
        const area = document.getElementById('previewArea');
        const p = productosGlobal.find(x => x.id === id);
        if(!p) return;

        area.innerHTML = "<p style='color:white;'>Generando vistas previas...</p>"; 
        
        let imagenes = [p.imgP];
        if(p.imgG) {
            const gal = p.imgG.split('|').map(u => u.trim()).filter(u => u !== "");
            imagenes = [...imagenes, ...gal];
        }

        area.innerHTML = ""; 
        for(let url of imagenes) {
            if(!url) continue;
            const card = document.createElement('div');
            card.className = "canvas-card";
            const canvas = document.createElement('canvas');
            card.appendChild(canvas);
            area.appendChild(card);
            // Ejecutamos en secuencia para no saturar el navegador
            await dibujarArteOptimizado(canvas, url, p, platform, color);
        }
    }

    async function dibujarArteOptimizado(canvas, imgUrl, p, platform, color) {
        const ctx = canvas.getContext('2d');
        const showWeb = document.getElementById('showWeb').checked;
        const showWA = document.getElementById('showWA').checked;
        const userWeb = document.getElementById('userWeb').value;
        const userWA = document.getElementById('userWA').value;

        let w = 1080, h = 1080;
        if(platform === 'tiktok') h = 1920;
        if(platform === 'fb_ads') { w = 1200; h = 630; }
        if(platform === 'ig_portrait') h = 1350;

        canvas.width = w; canvas.height = h;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0,0,w,h);

        try {
            // Carga de imagen con manejo de error
            const img = await cargarImg(imgUrl);
            const scale = Math.max(w / img.width, h / img.height);
            ctx.drawImage(img, (w/2)-(img.width*scale/2), (h/2)-(img.height*scale/2), img.width*scale, img.height*scale);

            // Capa de degradado inferior
            const grad = ctx.createLinearGradient(0, h, 0, h*0.5);
            grad.addColorStop(0, "rgba(0,0,0,0.85)");
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.fillRect(0, h*0.4, w, h*0.6);

            // Texto Principal
            ctx.fillStyle = "white";
            ctx.textAlign = "left";
            let textoAMostrar = p.tituloGancho.toUpperCase();
            let fontSize = 65;
            ctx.font = `bold ${fontSize}px Inter, Arial`;
            while(ctx.measureText(textoAMostrar).width > (w - 100) && fontSize > 30) {
                fontSize -= 2;
                ctx.font = `bold ${fontSize}px Inter, Arial`;
            }
            ctx.fillText(textoAMostrar, 50, h - 170);
            
            // Precio
            ctx.fillStyle = color;
            ctx.font = "bold 110px Inter, Arial";
            ctx.fillText("Q" + p.precio, 50, h - 60);

            // Información derecha
            ctx.textAlign = "right";
            let offsetInfo = 120;

            if(showWA && userWA) {
                ctx.fillStyle = "#25D366";
                ctx.font = "bold 32px Inter, Arial";
                ctx.fillText("WhatsApp: " + userWA, w - 50, h - offsetInfo);
                offsetInfo += 45;
            }

            if(showWeb && userWeb) {
                ctx.fillStyle = "white";
                ctx.font = "32px Inter, Arial";
                ctx.fillText(userWeb.toLowerCase(), w - 50, h - offsetInfo);
            }

            ctx.fillStyle = "rgba(255,255,255,0.8)";
            ctx.font = "italic 35px Inter, Arial";
            ctx.fillText(p.subCat, w - 50, h - 65);

            // Logo con manejo de error independiente
            try {
                const logo = await cargarImg(LOGO_URL);
                const logoW = 180;
                const logoH = logoW * (logo.height / logo.width);
                ctx.drawImage(logo, 50, 50, logoW, logoH);
            } catch(e) { console.warn("Logo no disponible"); }

        } catch (e) {
            ctx.fillStyle = "#333";
            ctx.font = "30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Error al cargar imagen del producto", w/2, h/2);
            console.error("Fallo en dibujo:", e);
        }
    }

    function cargarImg(url) {
        return new Promise((res, rej) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            // Limpiamos la URL de espacios y aplicamos el proxy de Weserv
            const cleanUrl = url.trim().replace(/^https?:\/\//, '');
            img.src = url.startsWith('http') ? PROXY + cleanUrl : url;
            
            img.onload = () => res(img);
            img.onerror = () => rej(new Error("No se pudo cargar la imagen: " + url));
        });
    }

    // ... (Mantener descargarTodo y copiarAlPortapapeles del código anterior) ...
</script>


</body>
</html>
